<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Atomic Clipper — Library</title>
  <link rel="stylesheet" href="library.css">
</head>
<body>
  <header>
    <h1>Library</h1>
  </header>
  <div id="storage-warning" hidden>
    Storage <span id="storage-pct"></span>% full —
    <strong>consider exporting or deleting clips before reaching the 10 MB limit.</strong>
  </div>
  <main id="library">
    <p id="empty-msg" hidden>No clips saved yet. Start clipping from the extension toolbar.</p>
  </main>
  <script type="module" src="library.js"></script>
</body>
</html>
