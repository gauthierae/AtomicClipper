<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Atomic Clipper</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <main id="app">
    <div id="state-default" hidden>
      <button id="start-clipping">Start Clipping</button>
    </div>
    <div id="state-unsupported" hidden>
      <p id="unsupported-msg">Cannot clip this page.</p>
    </div>
  </main>
  <footer>
    <button id="open-library">Open Library</button>
  </footer>
  <script src="popup.js"></script>
</body>
</html>
